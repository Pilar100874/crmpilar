<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Editor Blockly</title>
  <script src="https://unpkg.com/blockly/blockly.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }
    #blocklyDiv {
      height: calc(100vh - 60px);
      width: 100%;
    }
    #controls {
      height: 60px;
      padding: 10px;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    button {
      padding: 8px 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #45a049;
    }
    button.secondary {
      background: #2196F3;
    }
    button.secondary:hover {
      background: #0b7dda;
    }
  </style>
</head>
<body>
  <div id="controls">
    <button class="secondary" onclick="clearWorkspace()">Limpar</button>
    <span id="status" style="margin-left: 10px; color: #666;"></span>
  </div>
  <div id="blocklyDiv"></div>

  <xml id="toolbox" style="display: none">
    <category name="Lógica" colour="#5C81A6">
      <block type="controls_if"></block>
      <block type="logic_compare"></block>
      <block type="logic_operation"></block>
      <block type="logic_negate"></block>
      <block type="logic_boolean"></block>
    </category>
    <category name="Matemática" colour="#5CA65C">
      <block type="math_number">
        <field name="NUM">0</field>
      </block>
      <block type="math_arithmetic"></block>
      <block type="math_single"></block>
    </category>
    <category name="Texto" colour="#5CA699">
      <block type="text">
        <field name="TEXT"></field>
      </block>
      <block type="text_print"></block>
      <block type="text_join"></block>
    </category>
    
    <sep></sep>
    
    <category name="📊 Valores Orçamento" colour="#A65C81">
      <block type="valor_total"></block>
      <block type="mes_compra"></block>
      <block type="mes_aniversario"></block>
      <block type="quantidade_produtos"></block>
      <block type="historico_compras_mes"></block>
      <block type="dias_desde_ultimo_orcamento"></block>
      <block type="valor_grupo_produtos"></block>
      <block type="tempo_cliente_anos"></block>
      <block type="volume_acumulado_anual"></block>
    </category>
    
    <category name="💰 Descontos por Valor" colour="#D4AF37">
      <block type="desconto_por_faixa"></block>
      <block type="desconto_progressivo"></block>
      <block type="desconto_se_pagamento_antecipado"></block>
      <block type="desconto_crescimento_historico"></block>
    </category>
    
    <category name="🎂 Descontos por Data" colour="#FF69B4">
      <block type="desconto_mes_aniversario"></block>
      <block type="desconto_dia_aniversario"></block>
      <block type="desconto_black_friday"></block>
      <block type="desconto_primeiro_dia_mes"></block>
      <block type="desconto_em_feriado"></block>
    </category>
    
    <category name="👥 Fidelidade" colour="#4169E1">
      <block type="desconto_cliente_vip"></block>
      <block type="desconto_fidelidade_tempo"></block>
      <block type="frete_gratis_apos_compras"></block>
      <block type="desconto_sem_cancelamento"></block>
      <block type="pontos_fidelidade"></block>
    </category>
    
    <category name="📦 Produtos" colour="#32CD32">
      <block type="combo_produtos"></block>
      <block type="desconto_quantidade"></block>
      <block type="desconto_mix_categorias"></block>
      <block type="desconto_estoque_alto"></block>
      <block type="desconto_produto_parado"></block>
    </category>
    
    <category name="🧮 Cálculos" colour="#FF8C00">
      <block type="adicionar_frete"></block>
      <block type="taxa_urgencia"></block>
      <block type="calcular_markup"></block>
      <block type="validar_margem_minima"></block>
      <block type="calcular_por_unidade"></block>
    </category>
    
    <category name="💳 Financeiro" colour="#8B4513">
      <block type="desconto_boleto"></block>
      <block type="acrescimo_parcelamento"></block>
      <block type="validar_credito"></block>
      <block type="bloquear_por_inadimplencia"></block>
    </category>
    
    <category name="⚡ Ações" colour="#DC143C">
      <block type="desconto_percentual"></block>
      <block type="desconto_fixo"></block>
      <block type="enviar_alerta"></block>
      <block type="bloquear_desconto"></block>
    </category>
  </xml>

  <script>

              .setCheck("String")
              .appendField("se produto");
          this.appendValueInput("PRODUTO_B")
              .setCheck("String")
              .appendField("+ produto");
          this.appendValueInput("PERCENTUAL")
              .setCheck("Number")
              .appendField("desconto de");
          this.appendDummyInput()
              .appendField("%");
          this.setPreviousStatement(true, null);
          this.setNextStatement(true, null);
          this.setColour(120);

      Blockly.Blocks['desconto_quantidade'] = {
        init: function() {
          this.appendValueInput("QUANTIDADE_MIN")

              .setCheck("Number")
              .appendField("categorias, bônus de");
          this.appendDummyInput()
              .appendField("%");
          this.setPreviousStatement(true, null);
          this.setNextStatement(true, null);
          this.setColour(120);
        }
      };

      Blockly.Blocks['desconto_estoque_alto'] = {
        init: function() {
          this.appendValueInput("PRODUTO")
              .setCheck("String")
              .appendField("se estoque de");
          this.appendValueInput("PERCENTUAL")
              .setCheck("Number")

          this.appendDummyInput()
              .appendField("%");
          this.setPreviousStatement(true, null);

          this.setColour(120);

      Blockly.Blocks['desconto_produto_parado'] = {
        init: function() {
          this.appendValueInput("DIAS_PARADO")
              .setCheck("Number")
              .appendField("se produto parado há");
          this.appendValueInput("PERCENTUAL")
              .setCheck("Number")
              .appendField("dias, desconto de");
          this.appendDummyInput()

      // ========== CÁLCULOS ==========

              .setCheck("Number")

      Blockly.Blocks['taxa_urgencia'] = {

              .setCheck("Number")

              .setCheck("Number")

              .setCheck("Number")

      Blockly.Blocks['calcular_por_unidade'] = {

              .appendField("calcular por")

                ["metro", "METRO"],
                ["kg", "KG"],
                ["tonelada", "TONELADA"],

      // ========== GERADORES DE CÓDIGO JAVASCRIPT ==========
      
      Blockly.JavaScript['valor_total'] = function(block) {
        return ['orcamento.valor_total', Blockly.JavaScript.ORDER_ATOMIC];
      };

      Blockly.JavaScript['mes_compra'] = function(block) {
        return ['orcamento.mes_compra', Blockly.JavaScript.ORDER_ATOMIC];
      };

      Blockly.JavaScript['mes_aniversario'] = function(block) {
        return ['cliente.mes_aniversario', Blockly.JavaScript.ORDER_ATOMIC];
      };

      Blockly.JavaScript['quantidade_produtos'] = function(block) {
        return ['orcamento.quantidade_produtos', Blockly.JavaScript.ORDER_ATOMIC];
      };

      Blockly.JavaScript['historico_compras_mes'] = function(block) {
        return ['(cliente.compras_mes || 0)', Blockly.JavaScript.ORDER_ATOMIC];
      };

      Blockly.JavaScript['dias_desde_ultimo_orcamento'] = function(block) {
        return ['(cliente.dias_ultimo_orcamento || 0)', Blockly.JavaScript.ORDER_ATOMIC];
      };

      Blockly.JavaScript['valor_grupo_produtos'] = function(block) {
        var grupo = Blockly.JavaScript.valueToCode(block, 'GRUPO', Blockly.JavaScript.ORDER_ATOMIC);
        return ['(orcamento.valor_grupo_' + grupo + ' || 0)', Blockly.JavaScript.ORDER_ATOMIC];
      };

      Blockly.JavaScript['tempo_cliente_anos'] = function(block) {
        return ['(cliente.tempo_anos || 0)', Blockly.JavaScript.ORDER_ATOMIC];
      };

      Blockly.JavaScript['volume_acumulado_anual'] = function(block) {
        return ['(cliente.volume_anual || 0)', Blockly.JavaScript.ORDER_ATOMIC];
      };

      Blockly.JavaScript['desconto_por_faixa'] = function(block) {
        var valorMin = Blockly.JavaScript.valueToCode(block, 'VALOR_MIN', Blockly.JavaScript.ORDER_ATOMIC);
        var percentual = Blockly.JavaScript.valueToCode(block, 'PERCENTUAL', Blockly.JavaScript.ORDER_ATOMIC);
        return 'if (orcamento.valor_total >= ' + valorMin + ') {\n  aplicarDescontoPercentual(' + percentual + ');\n}\n';
      };

      Blockly.JavaScript['desconto_progressivo'] = function(block) {
        var valorBase = Blockly.JavaScript.valueToCode(block, 'VALOR_BASE', Blockly.JavaScript.ORDER_ATOMIC);
        var percentualInc = Blockly.JavaScript.valueToCode(block, 'PERCENTUAL_INC', Blockly.JavaScript.ORDER_ATOMIC);
        var teto = Blockly.JavaScript.valueToCode(block, 'TETO', Blockly.JavaScript.ORDER_ATOMIC);
        return 'var multiplos = Math.floor(orcamento.valor_total / ' + valorBase + ');\n' +
               'var desconto_prog = Math.min(multiplos * ' + percentualInc + ', ' + teto + ');\n' +
               'aplicarDescontoPercentual(desconto_prog);\n';
      };

      Blockly.JavaScript['desconto_se_pagamento_antecipado'] = function(block) {
        var percentual = Blockly.JavaScript.valueToCode(block, 'PERCENTUAL', Blockly.JavaScript.ORDER_ATOMIC);

    // Inicializar Blockly
    function initBlockly() {
      defineCustomBlocks();

      workspace = Blockly.inject('blocklyDiv', {
        toolbox: document.getElementById('toolbox'),
        grid: {
          spacing: 20,
          length: 3,
          colour: '#ccc',
          snap: true
        },
        zoom: {
          controls: true,
          wheel: true,
          startScale: 1.0,
          maxScale: 3,
          minScale: 0.3,
          scaleSpeed: 1.2
        },
        trashcan: true
      });
    }

    // Exportar regra
    function exportRule() {
      const xml = Blockly.Xml.workspaceToDom(workspace);
      const xmlText = Blockly.Xml.domToText(xml);
      
      // Gerar código JavaScript
      const code = Blockly.JavaScript.workspaceToCode(workspace);

      // Criar estrutura JSON
      const blocks = workspace.getAllBlocks(false);
      const rule = {
        name: "Regra de Automação",
        trigger: "onBudgetCalculate",
        xml: xmlText,
        code: code,
        blocks: blocks.map(block => ({
          type: block.type,
          id: block.id
        })),
        timestamp: new Date().toISOString()
      };

      // Enviar para parent via postMessage
      window.parent.postMessage({
        type: 'BLOCKLY_EXPORT',
        data: rule
      }, '*');

      showStatus('Regra exportada!');
    }

    // Limpar workspace
    function clearWorkspace() {
      if (confirm('Deseja limpar todos os blocos?')) {
        workspace.clear();
        showStatus('Workspace limpo');
      }
    }

    // Mostrar status
    function showStatus(message) {
      const status = document.getElementById('status');
      status.textContent = message;
      setTimeout(() => {
        status.textContent = '';
      }, 3000);
    }

    // Receber mensagens do parent
    window.addEventListener('message', (event) => {
      if (event.data.type === 'LOAD_XML') {
        const xml = Blockly.Xml.textToDom(event.data.xml);
        Blockly.Xml.domToWorkspace(xml, workspace);
        showStatus('Regra carregada');
      } else if (event.data.type === 'EXPORT_RULE') {
        // Parent pediu exportação (quando clica em Salvar)
        exportRule();
      }
    });

    // Inicializar quando carregar
    window.addEventListener('load', initBlockly);
  </script>
