<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Pilar - Monitor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 320px;
      padding: 20px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
    }
    
    .title {
      font-size: 16px;
      font-weight: 600;
    }
    
    .subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }
    
    .status-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    
    .status-label {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }
    
    .status-value {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    .status-dot.active {
      background: #10b981;
      box-shadow: 0 0 8px #10b981;
    }
    
    .status-dot.inactive {
      background: #6b7280;
    }
    
    .input-group {
      margin-bottom: 16px;
    }
    
    .input-label {
      display: block;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 6px;
    }
    
    .input-field {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    
    .input-field:focus {
      border-color: #667eea;
    }
    
    .input-field::placeholder {
      color: rgba(255,255,255,0.4);
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    
    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    
    .btn-danger {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: #fff;
    }
    
    .btn-danger:hover {
      opacity: 0.9;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .info-text {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      margin-top: 16px;
      line-height: 1.5;
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">CP</div>
    <div>
      <div class="title">CRM Pilar</div>
      <div class="subtitle">Monitor de Tela</div>
    </div>
  </div>
  
  <div class="status-card">
    <div class="status-row">
      <span class="status-label">Status do Monitoramento</span>
      <span class="status-value">
        <span id="statusDot" class="status-dot inactive"></span>
        <span id="statusText">Inativo</span>
      </span>
    </div>
    <div class="status-row" id="userRow" style="display: none;">
      <span class="status-label">Usuário</span>
      <span class="status-value" id="userIdDisplay">-</span>
    </div>
  </div>
  
  <div id="loginSection">
    <div class="input-group">
      <label class="input-label">ID do Usuário</label>
      <input type="text" id="userId" class="input-field" placeholder="Cole seu ID de usuário aqui">
    </div>
    
    <button id="startBtn" class="btn btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
        <line x1="8" y1="21" x2="16" y2="21"></line>
        <line x1="12" y1="17" x2="12" y2="21"></line>
      </svg>
      Iniciar Monitoramento
    </button>
  </div>
  
  <div id="activeSection" class="hidden">
    <button id="stopBtn" class="btn btn-danger">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="6" y="6" width="12" height="12"></rect>
      </svg>
      Parar Monitoramento
    </button>
  </div>
  
  <p class="info-text">
    Esta extensão captura sua tela periodicamente para monitoramento corporativo.
    A captura ocorre a cada 3 segundos enquanto ativa.
  </p>
  
  <script src="popup.js"></script>
</body>
</html>
