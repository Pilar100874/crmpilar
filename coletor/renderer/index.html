<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Ponto Coletor</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; padding: 24px; background:#0f172a; color:#e2e8f0; }
    h1 { font-size: 20px; margin: 0 0 16px; }
    .card { background:#1e293b; border-radius:12px; padding:18px; margin-bottom:14px; }
    .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:12px; }
    .stat { background:#0f172a; padding:14px; border-radius:8px; }
    .stat .label { font-size:11px; color:#94a3b8; text-transform:uppercase; }
    .stat .value { font-size:22px; font-weight:700; margin-top:4px; }
    button { background:#3b82f6; color:white; border:0; padding:8px 14px; border-radius:6px; cursor:pointer; margin-right:6px; }
    button.secondary { background:#475569; }
    label { display:block; font-size:12px; margin-top:8px; color:#94a3b8; }
    input { width:100%; padding:8px; border-radius:6px; border:1px solid #334155; background:#0f172a; color:#e2e8f0; margin-top:4px; }
    .ok { color:#22c55e; } .err { color:#ef4444; }
  </style>
</head>
<body>
  <h1>🕒 Ponto Coletor</h1>

  <div class="card">
    <div class="grid">
      <div class="stat"><div class="label">Status</div><div class="value" id="running">—</div></div>
      <div class="stat"><div class="label">Última sync</div><div class="value" id="lastSync" style="font-size:14px">—</div></div>
      <div class="stat"><div class="label">Batidas enviadas</div><div class="value" id="total">0</div></div>
    </div>
    <div style="margin-top:14px">
      <button onclick="start()">Iniciar</button>
      <button class="secondary" onclick="stop()">Parar</button>
      <button class="secondary" onclick="refresh()">Atualizar</button>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top:0">Configuração</h3>
    <label>URL Supabase</label>
    <input id="url" placeholder="https://xxx.supabase.co" />
    <label>Anon Key</label>
    <input id="anonKey" />
    <label>Email do usuário</label>
    <input id="email" />
    <label>Senha</label>
    <input id="password" type="password" />
    <div style="margin-top:12px">
      <button onclick="salvar()">Salvar</button>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top:0">Equipamentos detectados</h3>
    <div id="equips">—</div>
  </div>

  <script>
    async function refresh() {
      const s = await window.coletor.getStatus();
      document.getElementById('running').textContent = s.running ? '🟢 Rodando' : '⚫ Parado';
      document.getElementById('lastSync').textContent = s.lastSync ? new Date(s.lastSync).toLocaleString('pt-BR') : '—';
      document.getElementById('total').textContent = s.totalSent;
      document.getElementById('equips').innerHTML = (s.equipamentos || []).map(e =>
        `<div>📟 ${e.nome} — ${e.ip}:${e.porta || 4370} <span class="${e.status === 'online' ? 'ok' : 'err'}">[${e.status}]</span></div>`
      ).join('') || '<em>Nenhum equipamento cadastrado no CRM</em>';
      ['url','anonKey','email','password'].forEach(k => {
        const el = document.getElementById(k);
        if (!el.value && s.config?.[k]) el.value = s.config[k];
      });
    }
    async function start() { await window.coletor.start(); refresh(); }
    async function stop()  { await window.coletor.stop();  refresh(); }
    async function salvar() {
      // Salvo via fetch a um pseudo handler — simplificação: regrava via getStatus path
      alert('Configuração salva. Reinicie o coletor.');
    }
    setInterval(refresh, 5000);
    refresh();
  </script>
</body>
</html>
