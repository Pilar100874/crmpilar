name: Build Android TV Signage APK

on:
  push:
    branches: [main, master]
    paths:
      - 'android-tv-signage/**'
      - '.github/workflows/build-android-tv-signage.yml'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag opcional para criar release (ex: v1.2.3)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android-tv-signage

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Android SDK build-tools
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Configurar PATH do apksigner
        run: |
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> "$GITHUB_PATH"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls "$ANDROID_SDK_ROOT/build-tools/34.0.0/"
          which apksigner || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Tornar gradlew executável
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Verificar APK gerado
        run: |
          ls -la app/build/outputs/apk/release/

      - name: Assinar APK (keystore dos secrets)
        if: env.SIGNING_KEY != ''
        env:
          SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$SIGNING_KEY" | base64 -d > signing-key.jks
          apksigner sign \
            --ks signing-key.jks \
            --key-pass pass:"$KEY_PASSWORD" \
            --ks-pass pass:"$KEY_STORE_PASSWORD" \
            --key-alias "$KEY_ALIAS" \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          mv app/build/outputs/apk/release/app-release-signed.apk app/build/outputs/apk/release/app-release.apk

      - name: Assinar APK com debug keystore (fallback)
        if: env.SIGNING_KEY == ''
        env:
          SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
        run: |
          apksigner sign \
            --ks ~/.android/debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --key-alias androiddebugkey \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          mv app/build/outputs/apk/release/app-release-signed.apk app/build/outputs/apk/release/app-release.apk

      - name: Upload APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android-tv-signage/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Criar Release (se tag informada)
        if: github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: Android TV Signage ${{ github.event.inputs.release_tag }}
          files: android-tv-signage/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
