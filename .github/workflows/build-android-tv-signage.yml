name: Build Android TV Signage APK

on:
  push:
    branches: [main, master]
    paths:
      - 'android-tv-signage/**'
      - '.github/workflows/build-android-tv-signage.yml'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag opcional para criar release (ex: v1.2.3)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android-tv-signage

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Android SDK build-tools
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Configurar PATH do apksigner
        run: |
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> "$GITHUB_PATH"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls "$ANDROID_SDK_ROOT/build-tools/34.0.0/"
          which apksigner || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Tornar gradlew executável
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Verificar APK gerado
        run: |
          ls -la app/build/outputs/apk/release/

      - name: Re-assinar APK (keystore dos secrets)
        if: env.SIGNING_KEY != ''
        env:
          SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$SIGNING_KEY" | base64 -d > signing-key.jks
          IN_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          [ -f "$IN_APK" ] || IN_APK="app/build/outputs/apk/release/app-release.apk"
          apksigner sign \
            --ks signing-key.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass pass:"$KEY_STORE_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            "$IN_APK"
          mv -f app/build/outputs/apk/release/app-release-signed.apk app/build/outputs/apk/release/app-release.apk

      - name: Assinar APK com debug keystore (fallback)
        if: env.SIGNING_KEY == '' && hashFiles('android-tv-signage/app/build/outputs/apk/release/app-release-unsigned.apk') != ''
        env:
          SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
        run: |
          apksigner sign \
            --ks ~/.android/debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          mv -f app/build/outputs/apk/release/app-release-signed.apk app/build/outputs/apk/release/app-release.apk

      - name: Upload APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android-tv-signage/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Publicar Release rolling (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-tv-signage-latest
          name: Android TV Signage (latest)
          files: android-tv-signage/app/build/outputs/apk/release/app-release.apk
          prerelease: false
          make_latest: "true"
          body: |
            Build automático mais recente do app Android TV Signage.
            Baixe sempre o `app-release.apk` deste release para ter a versão mais nova.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Criar Release versionada (se tag informada)
        if: github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: Android TV Signage ${{ github.event.inputs.release_tag }}
          files: android-tv-signage/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Atualizar manifesto de download (public/apps)
        run: |
          mkdir -p ../public/apps
          cat > ../public/apps/android-tv-signage-latest.json <<EOF
          {
            "repo": "${{ github.repository }}",
            "tag": "android-tv-signage-latest",
            "asset": "app-release.apk",
            "url": "https://github.com/${{ github.repository }}/releases/download/android-tv-signage-latest/app-release.apk",
            "updated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}"
          }
          EOF

      - name: Commit manifesto atualizado
        working-directory: ${{ github.workspace }}
        run: |
          if git diff --quiet public/apps/android-tv-signage-latest.json; then
            echo "Sem mudanças no manifesto."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/apps/android-tv-signage-latest.json
          git commit -m "chore(tv-signage): atualizar manifesto do APK [skip ci]"
          git push
