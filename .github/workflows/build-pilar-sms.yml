name: Build Pilar SMS APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'pilar-sms-app/**'
      - '.github/workflows/build-pilar-sms.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pilar-sms-app
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Usar SDK do GitHub Actions
        run: rm -f local.properties

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Ler versionName do build.gradle.kts
        id: version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n1)
          CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts | head -n1)
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "code=${CODE}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Versão detectada: ${VERSION} (code ${CODE}) sha ${SHORT_SHA}"

      - name: Build APK release compatível assinado
        run: ./gradlew clean :app:assembleRelease --no-daemon

      - name: Renomear APK com versão
        id: rename
        run: |
          mkdir -p dist
          APK_SRC=app/build/outputs/apk/release/app-release.apk
          APK_DST=dist/pilar-sms-v${{ steps.version.outputs.version }}.apk
          test -f "$APK_SRC"
          cp "$APK_SRC" "$APK_DST"
          echo "apk=$APK_DST" >> "$GITHUB_OUTPUT"
          ls -lh dist/

      - name: Verificar APK instalável
        run: |
          APK="dist/pilar-sms-v${{ steps.version.outputs.version }}.apk"
          test -s "$APK"
          unzip -t "$APK" >/dev/null
          APKSIGNER=$(ls "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | tail -n 1)
          "$APKSIGNER" verify --min-sdk-version 21 --verbose --print-certs "$APK"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pilar-sms-v${{ steps.version.outputs.version }}
          path: pilar-sms-app/dist/*.apk

      - name: Criar / atualizar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sms-v${{ steps.version.outputs.version }}
          name: Pilar SMS v${{ steps.version.outputs.version }}
          body: |
            APK do gateway Pilar SMS.

            - versionName: `${{ steps.version.outputs.version }}`
            - versionCode: `${{ steps.version.outputs.code }}`
            - commit: `${{ steps.version.outputs.short_sha }}`

            APK release compatível assinado com V1+V2+V3, pronto para instalação direta no aparelho.
          files: |
            pilar-sms-app/dist/pilar-sms-v${{ steps.version.outputs.version }}.apk
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Atualizar public/coletor/sms-version.json
        working-directory: ${{ github.workspace }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          FILENAME="pilar-sms-v${VERSION}.apk"
          URL="https://github.com/${REPO}/releases/download/sms-v${VERSION}/${FILENAME}"
          node -e "
            const fs = require('fs');
            const p = 'public/coletor/sms-version.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            j.version = '${VERSION}';
            j.downloadUrl = '${URL}';
            j.filename = '${FILENAME}';
            j.notas = 'v${VERSION}: nova tela de diagnóstico com envio de SMS de teste direto do celular + código exato do Android por mensagem.';
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          "
          cat public/coletor/sms-version.json

      - name: Commit sms-version.json bump
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet public/coletor/sms-version.json; then
            echo "sms-version.json unchanged"
          else
            git add public/coletor/sms-version.json
            git commit -m "chore(sms): publish apk v${{ steps.version.outputs.version }} [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin main && git push origin HEAD:main && break
              echo "push retry $i..."
              sleep 3
            done
          fi
