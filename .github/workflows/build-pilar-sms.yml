name: Build Pilar SMS APK

on:
  push:
    paths:
      - 'pilar-sms-app/**'
      - '.github/workflows/build-pilar-sms.yml'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pilar-sms-app
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Ler versionName do build.gradle.kts
        id: version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n1)
          CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts | head -n1)
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "code=${CODE}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Versão detectada: ${VERSION} (code ${CODE}) sha ${SHORT_SHA}"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon

      - name: Renomear APKs com versão
        id: rename
        run: |
          mkdir -p dist
          DEBUG_SRC=app/build/outputs/apk/debug/app-debug.apk
          REL_SRC=app/build/outputs/apk/release/app-release-unsigned.apk
          DEBUG_DST=dist/pilar-sms-v${{ steps.version.outputs.version }}-debug.apk
          REL_DST=dist/pilar-sms-v${{ steps.version.outputs.version }}-release-unsigned.apk
          cp "$DEBUG_SRC" "$DEBUG_DST"
          cp "$REL_SRC" "$REL_DST"
          echo "debug_apk=$DEBUG_DST" >> "$GITHUB_OUTPUT"
          echo "release_apk=$REL_DST" >> "$GITHUB_OUTPUT"
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pilar-sms-v${{ steps.version.outputs.version }}
          path: pilar-sms-app/dist/*.apk

      - name: Criar / atualizar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sms-v${{ steps.version.outputs.version }}
          name: Pilar SMS v${{ steps.version.outputs.version }}
          body: |
            APK do gateway Pilar SMS.

            - versionName: `${{ steps.version.outputs.version }}`
            - versionCode: `${{ steps.version.outputs.code }}`
            - commit: `${{ steps.version.outputs.short_sha }}`

            **Debug** já vem assinado com a chave debug (instalável direto no aparelho).
            **Release** está sem assinatura — assine antes de distribuir.
          files: |
            pilar-sms-app/dist/pilar-sms-v${{ steps.version.outputs.version }}-debug.apk
            pilar-sms-app/dist/pilar-sms-v${{ steps.version.outputs.version }}-release-unsigned.apk
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Atualizar public/coletor/sms-version.json
        working-directory: ${{ github.workspace }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          FILENAME="pilar-sms-v${VERSION}-debug.apk"
          URL="https://github.com/${REPO}/releases/download/sms-v${VERSION}/${FILENAME}"
          node -e "
            const fs = require('fs');
            const p = 'public/coletor/sms-version.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            j.version = '${VERSION}';
            j.downloadUrl = '${URL}';
            j.filename = '${FILENAME}';
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          "
          cat public/coletor/sms-version.json

      - name: Commit sms-version.json bump
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet public/coletor/sms-version.json; then
            echo "sms-version.json unchanged"
          else
            git add public/coletor/sms-version.json
            git commit -m "chore(sms): publish apk v${{ steps.version.outputs.version }} [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin main && git push origin HEAD:main && break
              echo "push retry $i..."
              sleep 3
            done
          fi
